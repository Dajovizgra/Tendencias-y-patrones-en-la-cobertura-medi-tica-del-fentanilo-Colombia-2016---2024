<!DOCTYPE html>
<html lang="es">
<head>
    <!-- META TAGS - Información del documento -->
    <meta charset="UTF-8">
    <!-- Define que el documento usa caracteres UTF-8 (español, acentos, etc.) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Hace que la página sea responsive en dispositivos móviles -->
    <title>Mi Página de Contenido</title>
    <!-- Título que aparece en la pestaña del navegador -->

    <style>
        /* ========== ESTILOS GENERALES ========== */
        
        /* Reset - Elimina márgenes y espacios por defecto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* box-sizing asegura que el padding no suma al tamaño del elemento */
        }

        /* BODY - Estilos generales del cuerpo de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Fuente principal - si no encuentra Segoe UI usa otras alternativas */
            
            /* GRADIENTE DE FONDO - Degradado diagonal morado y azul oscuro */
            background: linear-gradient(135deg, #1a0033 0%, #0d1f1f 50%, #1a0033 100%);
            /* 135deg = ángulo diagonal, #1a0033 = morado muy oscuro, #0d1f1f = azul oscuro */
            
            color: #e0e0e0;
            /* Color del texto por defecto - gris claro */
            line-height: 1.6;
            /* Espacio entre líneas para mejor legibilidad */
        }

        /* ========== SECCIÓN HERO (INICIAL CON GIF) ========== */
        
        /* CONTENEDOR DEL HERO */
        .hero {
            position: relative;
            /* Posicionamiento relativo para que los elementos internos se posicionen respecto a esto */
            width: 100%;
            /* Ancho completo de la pantalla */
            height: 100vh;
            /* Altura completa del viewport (pantalla visible) */
            overflow: hidden;
            /* Oculta cualquier contenido que salga del contenedor */
            display: flex;
            /* Usa flexbox para centrar contenido */
            align-items: center;
            /* Centra verticalmente */
            justify-content: center;
            /* Centra horizontalmente */
        }

        /* GIF DEL HERO */
        .hero-gif {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Ajusta la imagen sin deformarla, cubriendo todo el espacio */
            object-position: center;
            /* Centra la imagen dentro del contenedor */
        }

        /* CONTENEDOR DEL TÍTULO DEL HERO */
        .hero-title {
            position: absolute;
            /* Se posiciona sobre el GIF */
            top: 50%;
            left: 50%;
            /* Estos dos valores lo colocan en el centro (sin transform sería descentrado) */
            transform: translate(-50%, -50%);
            /* Ajusta la posición usando el próprio tamaño del elemento */
            text-align: center;
            z-index: 10;
            /* Nivel de profundidad - aparece sobre el GIF */
        }

        /* TÍTULO H1 DEL HERO */
        .hero-title h1 {
            font-size: clamp(2rem, 8vw, 4.5rem);
            /* clamp = tamaño mínimo, preferido (escala con pantalla), máximo */
            /* 2rem = mínimo, 8vw = escala con 8% del ancho de pantalla, 4.5rem = máximo */
            
            color: #fff;
            /* Blanco puro */
            
            /* SOMBRA DE TEXTO - Efecto de profundidad */
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.7), 
                         -2px -2px 8px rgba(76, 255, 200, 0.3);
            /* Primera sombra: negra oscura, Segunda: cian claro */
            
            font-weight: 700;
            /* Texto muy grueso/bold */
            letter-spacing: 2px;
            /* Espacio entre letras */
            margin-bottom: 10px;
            animation: fadeIn 1.2s ease-in;
            /* Aplica animación que reaparece suavemente en 1.2 segundos */
        }

        /* SUBTÍTULO DEL HERO */
        .hero-title p {
            font-size: clamp(0.9rem, 3vw, 1.3rem);
            color: #4cffcc;
            /* Cian/aguamarina claro */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
            font-weight: 300;
            /* Texto delgado */
            animation: fadeIn 1.5s ease-in;
            /* Mismo efecto pero con retraso de 0.3s respecto al h1 */
        }

        /* ANIMACIÓN FADEÍN - Desvanecer entrada */
        @keyframes fadeIn {
            from {
                opacity: 0;
                /* Comienza invisible */
                transform: translateY(20px);
                /* Comienza 20px más abajo */
            }
            to {
                opacity: 1;
                /* Termina visible */
                transform: translateY(0);
                /* Vuelve a posición normal */
            }
        }

        /* ========== CONTENEDOR GENERAL ========== */
        .container {
            max-width: 1200px;
            /* Máximo ancho para que no quede demasiado ancho en pantallas grandes */
            margin: 0 auto;
            /* Centra horizontalmente */
            padding: 0 20px;
            /* Espacios laterales en dispositivos pequeños */
        }

        /* ========== SECCIÓN DISCLAIMER (ACLARACIONES) ========== */
        .disclaimer {
            margin: 80px auto;
            /* 80px arriba y abajo, centrado */
            padding: 40px;
            /* Espacio interno */
            
            /* FONDO GRADIENTE CON TRANSPARENCIA */
            background: linear-gradient(135deg, rgba(100, 50, 150, 0.2), rgba(76, 255, 200, 0.1));
            /* Morado y cian semi-transparentes */
            
            border-left: 5px solid #9d4edd;
            /* Borde izquierdo grueso morado - efecto visual */
            border-radius: 8px;
            /* Esquinas redondeadas */
            
            backdrop-filter: blur(10px);
            /* Efecto vidrio esmerilado (desenfoque de fondo) */
            border: 1px solid rgba(157, 78, 221, 0.3);
            /* Borde sutil morado */
            
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }

        /* TÍTULO DEL DISCLAIMER */
        .disclaimer h2 {
            color: #9d4edd;
            /* Morado */
            margin-bottom: 15px;
            /* Espacio debajo */
            font-size: 1.8rem;
        }

        /* PÁRRAFO DEL DISCLAIMER */
        .disclaimer p {
            color: #c0c0c0;
            /* Gris claro */
            font-size: 1rem;
            line-height: 1.8;
            /* Más espacio entre líneas para legibilidad */
        }

        /* ========== SECCIÓN DE GIFS CON VIDEO ========== */
        .gifs-section {
            margin: 100px 0;
            /* Espacios arriba y abajo */
        }

        /* GRID/REJILLA DE GIFS */
        .gifs-grid {
            display: grid;
            /* Usa sistema de grid (cuadrículas) */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            /* Repite columnas de mínimo 280px, máximo lo que quede disponible */
            /* auto-fit = responsivo automáticamente */
            gap: 40px;
            /* Espacio entre elementos */
            margin-top: 50px;
        }

        /* TARJETA INDIVIDUAL DE GIF */
        .gif-card {
            cursor: pointer;
            /* Cambia cursor a mano (indica que es clickeable) */
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            /* Anima cambios de posición y sombra suavemente en 0.3s */
            animation: slideUp 0.6s ease-out;
            /* Animación de entrada */
        }

        /* ANIMACIÓN SLIDEUP - Deslizar hacia arriba */
        @keyframes slideUp {
            from {
                opacity: 0;
                /* Comienza invisible */
                transform: translateY(30px);
                /* Comienza 30px más abajo */
            }
            to {
                opacity: 1;
                /* Termina visible */
                transform: translateY(0);
                /* Posición normal */
            }
        }

        /* EFECTO HOVER (al pasar el mouse) EN LA TARJETA */
        .gif-card:hover {
            transform: translateY(-10px);
            /* Sube la tarjeta 10px */
            box-shadow: 0 20px 40px rgba(157, 78, 221, 0.4);
            /* Sombra grande morada */
        }

        /* CONTENEDOR DEL GIF */
        .gif-container {
            position: relative;
            width: 100%;
            overflow: hidden;
            /* Oculta contenido que sale, importante para esquinas redondeadas */
            border-radius: 12px;
            border: 2px solid rgba(76, 255, 200, 0.3);
            /* Borde cian semi-transparente */
            background: linear-gradient(135deg, #1a0033, #0d2e2e);
            /* Fondo degradado morado-azul */
        }

        /* OVERLAY OSCURO EN HOVER (pseudo-elemento ::before) */
        .gif-container::before {
            content: '';
            /* Crea un elemento invisible */
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            /* Cubre toda el área */
            background: rgba(157, 78, 221, 0.1);
            /* Capa morada muy transparente */
            opacity: 0;
            /* Comienza invisible */
            transition: opacity 0.3s ease;
            z-index: 5;
            /* Aparece entre el gif y el botón play */
        }

        /* MOSTRAR EL OVERLAY CUANDO SE HACE HOVER EN LA TARJETA */
        .gif-card:hover .gif-container::before {
            opacity: 1;
            /* Aparece visible */
        }

        /* ICONO DE PLAY (BOTÓN PARA VER VIDEO) */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            /* Centra el icono */
            transform: translate(-50%, -50%);
            width: 70px;
            height: 70px;
            background: rgba(157, 78, 221, 0.9);
            /* Fondo morado opaco */
            border-radius: 50%;
            /* Forma circular */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 6;
            /* Aparece sobre el overlay */
            opacity: 0;
            /* Comienza invisible */
            transition: opacity 0.3s ease, transform 0.3s ease;
            box-shadow: 0 0 30px rgba(76, 255, 200, 0.5);
            /* Brillo cian alrededor */
        }

        /* MOSTRAR PLAY ICON EN HOVER */
        .gif-card:hover .play-icon {
            opacity: 1;
            /* Aparece visible */
            transform: translate(-50%, -50%) scale(1.1);
            /* Se agranda un 10% */
        }

        /* TRIÁNGULO DE PLAY (SÍMBOLO ▶) */
        .play-icon::after {
            content: '▶';
            /* Carácter Unicode de triángulo play */
            color: #fff;
            font-size: 1.8rem;
            margin-left: 4px;
            /* Centra un poco el triángulo */
        }

        /* IMAGEN DEL GIF */
        .gif-image {
            width: 100%;
            height: auto;
            /* Mantiene proporción original */
            display: block;
            border-radius: 12px;
        }

        /* CONTENEDOR DE TEXTO DEBAJO DEL GIF */
        .gif-text {
            margin-top: 20px;
            text-align: center;
        }

        /* TÍTULO DE LA TARJETA */
        .gif-text h3 {
            color: #4cffcc;
            /* Cian */
            font-size: 1.3rem;
            margin-bottom: 8px;
        }

        /* DESCRIPCIÓN DE LA TARJETA */
        .gif-text p {
            color: #a0a0a0;
            /* Gris */
            font-size: 0.95rem;
        }

        /* ========== MODAL PARA VER VIDEOS EN PANTALLA COMPLETA ========== */
        
        /* FONDO OSCURO DEL MODAL */
        .modal {
            display: none;
            /* Comienza oculto */
            position: fixed;
            /* Se queda fijo en pantalla aunque hagas scroll */
            z-index: 1000;
            /* Nivel muy alto, aparece sobre todo */
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            /* Fondo negro semi-transparente */
            animation: fadeIn 0.3s ease;
        }

        /* MOSTRAR EL MODAL */
        .modal.show {
            display: flex;
            /* Cambiar a visible */
            align-items: center;
            justify-content: center;
            /* Centra el contenido */
        }

        /* CAJA DEL MODAL (EL VIDEO Y SU MARCO) */
        .modal-content {
            position: relative;
            width: 90%;
            /* 90% del ancho de la pantalla */
            max-width: 900px;
            /* Pero máximo 900px */
            max-height: 85vh;
            /* Máximo altura 85% de la pantalla */
            background: #0a0a0a;
            /* Fondo negro puro */
            border-radius: 12px;
            overflow: hidden;
            /* Oculta contenido que sale de las esquinas redondeadas */
            box-shadow: 0 0 50px rgba(157, 78, 221, 0.8);
            /* Sombra morada intensa */
            animation: slideDown 0.3s ease;
            /* Animación de entrada */
        }

        /* ANIMACIÓN SLIDEDOWN - Deslizar hacia abajo */
        @keyframes slideDown {
            from {
                transform: translateY(-50px);
                /* Comienza 50px arriba */
                opacity: 0;
                /* Invisible */
            }
            to {
                transform: translateY(0);
                /* Baja a posición normal */
                opacity: 1;
                /* Visible */
            }
        }

        /* VIDEO DENTRO DEL MODAL */
        .modal-video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* BOTÓN CERRAR MODAL (X) */
        .close-modal {
            position: absolute;
            /* Se coloca en la esquina del modal */
            top: 15px;
            right: 20px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 1001;
            /* Aparece sobre el video */
            background: rgba(157, 78, 221, 0.8);
            /* Fondo morado */
            width: 45px;
